<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" font-family="'Roboto', 'Segoe UI', sans-serif">
  <rect width="400" height="800" fill="#141218"/>

  <!-- Top bar -->
  <text x="20" y="34" fill="#FFB870" font-size="18">◐</text>
  <text x="40" y="32" fill="#CAC4D0" font-size="9" letter-spacing="1.5">WELCOME HOME</text>
  <text x="40" y="50" fill="#E6E0E9" font-size="20" font-weight="bold">Smart Home</text>
  <rect x="290" y="22" width="92" height="34" rx="17" fill="#00504A"/>
  <text x="336" y="44" fill="#9CF1E3" font-size="13" font-weight="bold" text-anchor="middle">↶ Undo</text>

  <!-- Mode picker -->
  <text x="16" y="86" fill="#CAC4D0" font-size="11" letter-spacing="1.5" font-weight="bold">AUTOMATION MODE</text>
  <rect x="16" y="100" width="120" height="44" rx="22" ry="22" fill="none" stroke="#938F99"/>
  <text x="76" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">ECO</text>
  <rect x="136" y="100" width="120" height="44" fill="none" stroke="#938F99"/>
  <text x="196" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">SLEEP</text>
  <rect x="256" y="100" width="120" height="44" rx="22" ry="22" fill="none" stroke="#938F99"/>
  <text x="316" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">AWAY</text>

  <!-- Section title -->
  <text x="22" y="184" fill="#E6E0E9" font-size="18" font-weight="bold">Decorator showcase</text>
  <text x="22" y="206" fill="#CAC4D0" font-size="11">Wrap any device to add behavior — logging,</text>
  <text x="22" y="220" fill="#CAC4D0" font-size="11">energy tracking — without modifying its class.</text>

  <!-- Section card 1: pick + wrap -->
  <rect x="16" y="240" width="368" height="148" rx="16" fill="#211F26"/>
  <text x="32" y="266" fill="#CAC4D0" font-size="11" letter-spacing="1.5" font-weight="bold">DEVICE</text>
  <rect x="32" y="276" width="336" height="38" rx="8" fill="#2B2930" stroke="#49454F"/>
  <text x="48" y="300" fill="#E6E0E9" font-size="13">Kitchen · Ceiling Light</text>
  <text x="354" y="300" fill="#CAC4D0" font-size="13" text-anchor="end">▾</text>
  <!-- Wrap + Unwrap buttons -->
  <rect x="32" y="328" width="160" height="36" rx="18" fill="#FFB870"/>
  <text x="112" y="350" fill="#48290B" font-size="12" font-weight="bold" text-anchor="middle">Wrap with logging</text>
  <rect x="208" y="328" width="160" height="36" rx="18" fill="none" stroke="#938F99"/>
  <text x="288" y="350" fill="#E6E0E9" font-size="12" text-anchor="middle">Unwrap</text>
  <text x="32" y="380" fill="#79747E" font-size="11" font-style="italic">Wrapped Ceiling Light. Toggle it below to capture calls.</text>

  <!-- Section card 2: exercise -->
  <rect x="16" y="404" width="368" height="100" rx="16" fill="#211F26"/>
  <text x="32" y="430" fill="#CAC4D0" font-size="11" letter-spacing="1.5" font-weight="bold">EXERCISE THE DEVICE</text>
  <rect x="32" y="442" width="160" height="36" rx="18" fill="none" stroke="#938F99"/>
  <text x="112" y="464" fill="#E6E0E9" font-size="12" text-anchor="middle">Turn on</text>
  <rect x="208" y="442" width="160" height="36" rx="18" fill="none" stroke="#938F99"/>
  <text x="288" y="464" fill="#E6E0E9" font-size="12" text-anchor="middle">Turn off</text>

  <!-- Captured log -->
  <text x="22" y="538" fill="#FFB870" font-size="13" font-weight="bold">Captured by the decorator</text>
  <text x="22" y="566" fill="#80D4C7" font-size="11" font-family="'Consolas', monospace">• decorator attached at 14:35:22</text>
  <text x="22" y="586" fill="#80D4C7" font-size="11" font-family="'Consolas', monospace">• turnOn(Ceiling Light)</text>
  <text x="22" y="606" fill="#80D4C7" font-size="11" font-family="'Consolas', monospace">• turnOff(Ceiling Light)</text>
  <text x="22" y="626" fill="#80D4C7" font-size="11" font-family="'Consolas', monospace">• turnOn(Ceiling Light)</text>

  <!-- Bottom nav (Demo active) -->
  <rect x="0" y="736" width="400" height="64" fill="#141218"/>
  <line x1="0" y1="736" x2="400" y2="736" stroke="#49454F"/>
  <text x="66" y="757" fill="#CAC4D0" font-size="14" text-anchor="middle">🏠</text>
  <text x="66" y="784" fill="#CAC4D0" font-size="11" text-anchor="middle">Home</text>
  <text x="200" y="757" fill="#CAC4D0" font-size="14" text-anchor="middle">📋</text>
  <text x="200" y="784" fill="#CAC4D0" font-size="11" text-anchor="middle">History</text>
  <rect x="318" y="744" width="32" height="16" rx="8" fill="#00504A"/>
  <text x="334" y="757" fill="#9CF1E3" font-size="14" text-anchor="middle">✨</text>
  <text x="334" y="784" fill="#FFB870" font-size="11" font-weight="bold" text-anchor="middle">Demo</text>
</svg>
