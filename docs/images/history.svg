<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" font-family="'Roboto', 'Segoe UI', sans-serif">
  <rect width="400" height="800" fill="#141218"/>

  <!-- Top bar -->
  <text x="20" y="34" fill="#FFB870" font-size="18">◐</text>
  <text x="40" y="32" fill="#CAC4D0" font-size="9" letter-spacing="1.5">WELCOME HOME</text>
  <text x="40" y="50" fill="#E6E0E9" font-size="20" font-weight="bold">Smart Home</text>
  <rect x="290" y="22" width="92" height="34" rx="17" fill="#00504A"/>
  <text x="336" y="44" fill="#9CF1E3" font-size="13" font-weight="bold" text-anchor="middle">↶ Undo</text>

  <!-- Mode picker (none active) -->
  <text x="16" y="86" fill="#CAC4D0" font-size="11" letter-spacing="1.5" font-weight="bold">AUTOMATION MODE</text>
  <rect x="16" y="100" width="120" height="44" rx="22" ry="22" fill="none" stroke="#938F99"/>
  <text x="76" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">ECO</text>
  <rect x="136" y="100" width="120" height="44" fill="none" stroke="#938F99"/>
  <text x="196" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">SLEEP</text>
  <rect x="256" y="100" width="120" height="44" rx="22" ry="22" fill="none" stroke="#938F99"/>
  <text x="316" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">AWAY</text>

  <!-- Section title -->
  <text x="22" y="184" fill="#E6E0E9" font-size="18" font-weight="bold">Activity</text>
  <text x="22" y="204" fill="#CAC4D0" font-size="11">Device events from this session and earlier — persisted via the DAO pattern.</text>

  <!-- Event row template (M3 list with leading icon, two lines) -->
  <!-- Row 1 -->
  <rect x="16" y="220" width="368" height="56" rx="16" fill="#211F26"/>
  <circle cx="44" cy="248" r="14" fill="#684626"/>
  <text x="44" y="253" fill="#FFDDB7" font-size="13" text-anchor="middle">●</text>
  <text x="74" y="244" fill="#E6E0E9" font-size="13" font-weight="bold">Ceiling Light</text>
  <text x="74" y="262" fill="#CAC4D0" font-size="11">TURNED_ON</text>
  <text x="368" y="244" fill="#79747E" font-size="11" text-anchor="end">14:23:01</text>

  <!-- Row 2 -->
  <rect x="16" y="288" width="368" height="56" rx="16" fill="#211F26"/>
  <circle cx="44" cy="316" r="14" fill="#684626"/>
  <text x="44" y="321" fill="#FFDDB7" font-size="13" text-anchor="middle">✦</text>
  <text x="74" y="312" fill="#E6E0E9" font-size="13" font-weight="bold">Ceiling Light</text>
  <text x="74" y="330" fill="#CAC4D0" font-size="11">BRIGHTNESS_CHANGED</text>
  <text x="368" y="312" fill="#79747E" font-size="11" text-anchor="end">14:22:47</text>

  <!-- Row 3 -->
  <rect x="16" y="356" width="368" height="56" rx="16" fill="#211F26"/>
  <circle cx="44" cy="384" r="14" fill="#684626"/>
  <text x="44" y="389" fill="#FFDDB7" font-size="13" text-anchor="middle">🌡</text>
  <text x="74" y="380" fill="#E6E0E9" font-size="13" font-weight="bold">Kitchen Thermostat</text>
  <text x="74" y="398" fill="#CAC4D0" font-size="11">TEMP_CHANGED</text>
  <text x="368" y="380" fill="#79747E" font-size="11" text-anchor="end">14:22:47</text>

  <!-- Row 4 -->
  <rect x="16" y="424" width="368" height="56" rx="16" fill="#211F26"/>
  <circle cx="44" cy="452" r="14" fill="#00504A"/>
  <text x="44" y="457" fill="#9CF1E3" font-size="13" text-anchor="middle">▣</text>
  <text x="74" y="448" fill="#E6E0E9" font-size="13" font-weight="bold">Smart Lock</text>
  <text x="74" y="466" fill="#CAC4D0" font-size="11">LOCKED</text>
  <text x="368" y="448" fill="#79747E" font-size="11" text-anchor="end">14:21:08</text>

  <!-- Row 5 -->
  <rect x="16" y="492" width="368" height="56" rx="16" fill="#211F26"/>
  <circle cx="44" cy="520" r="14" fill="#2B2930"/>
  <text x="44" y="525" fill="#79747E" font-size="13" text-anchor="middle">○</text>
  <text x="74" y="516" fill="#E6E0E9" font-size="13" font-weight="bold">Lamp</text>
  <text x="74" y="534" fill="#CAC4D0" font-size="11">TURNED_OFF</text>
  <text x="368" y="516" fill="#79747E" font-size="11" text-anchor="end">14:20:45</text>

  <!-- Row 6 -->
  <rect x="16" y="560" width="368" height="56" rx="16" fill="#211F26"/>
  <circle cx="44" cy="588" r="14" fill="#684626"/>
  <text x="44" y="593" fill="#FFDDB7" font-size="13" text-anchor="middle">●</text>
  <text x="74" y="584" fill="#E6E0E9" font-size="13" font-weight="bold">Lamp</text>
  <text x="74" y="602" fill="#CAC4D0" font-size="11">TURNED_ON</text>
  <text x="368" y="584" fill="#79747E" font-size="11" text-anchor="end">14:18:11</text>

  <text x="200" y="660" fill="#79747E" font-size="11" text-anchor="middle" font-style="italic">… continues with older events …</text>

  <!-- Bottom nav (History active) -->
  <rect x="0" y="736" width="400" height="64" fill="#141218"/>
  <line x1="0" y1="736" x2="400" y2="736" stroke="#49454F"/>
  <text x="66" y="757" fill="#CAC4D0" font-size="14" text-anchor="middle">🏠</text>
  <text x="66" y="784" fill="#CAC4D0" font-size="11" text-anchor="middle">Home</text>
  <rect x="184" y="744" width="32" height="16" rx="8" fill="#00504A"/>
  <text x="200" y="757" fill="#9CF1E3" font-size="14" text-anchor="middle">📋</text>
  <text x="200" y="784" fill="#FFB870" font-size="11" font-weight="bold" text-anchor="middle">History</text>
  <text x="334" y="757" fill="#CAC4D0" font-size="14" text-anchor="middle">✨</text>
  <text x="334" y="784" fill="#CAC4D0" font-size="11" text-anchor="middle">Demo</text>
</svg>
