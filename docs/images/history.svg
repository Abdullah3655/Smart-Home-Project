<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" font-family="'Segoe UI', sans-serif">
  <rect width="400" height="800" fill="#0e1626"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="400" height="60" fill="#0e1626"/>
  <line x1="0" y1="60" x2="400" y2="60" stroke="#1f2940"/>
  <text x="16" y="38" fill="#ffb547" font-size="20" font-weight="bold">●</text>
  <text x="36" y="38" fill="#f5f6fa" font-size="20" font-weight="bold">Smart Home</text>
  <rect x="290" y="14" width="94" height="32" rx="8" fill="#161f33" stroke="#1f2940"/>
  <text x="337" y="34" fill="#f5f6fa" font-size="13" text-anchor="middle">↶  Undo</text>

  <!-- Mode picker (still visible at top) -->
  <text x="16" y="80" fill="#8a93a8" font-size="12">AUTOMATION</text>
  <rect x="16" y="88" width="120" height="44" rx="8" fill="#161f33" stroke="#1f2940"/>
  <text x="76" y="115" fill="#8a93a8" font-size="13" font-weight="bold" text-anchor="middle">ECO</text>
  <rect x="136" y="88" width="120" height="44" fill="#161f33" stroke="#1f2940"/>
  <text x="196" y="115" fill="#8a93a8" font-size="13" font-weight="bold" text-anchor="middle">SLEEP</text>
  <rect x="256" y="88" width="120" height="44" rx="8" fill="#161f33" stroke="#1f2940"/>
  <text x="316" y="115" fill="#8a93a8" font-size="13" font-weight="bold" text-anchor="middle">AWAY</text>

  <!-- Section header -->
  <text x="16" y="170" fill="#ffb547" font-size="14" font-weight="bold">Recent device events</text>
  <text x="16" y="188" fill="#5a6478" font-size="10" font-style="italic">Persisted via the DAO pattern — survive app restart</text>

  <!-- Event row template -->
  <!-- Row 1: TURNED_ON (most recent, amber dot) -->
  <rect x="16" y="208" width="368" height="40" rx="10" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="234" fill="#ffb547" font-size="14">●</text>
  <text x="64" y="232" fill="#5a6478" font-size="11">14:23:01</text>
  <text x="124" y="232" fill="#f5f6fa" font-size="13">Ceiling Light</text>
  <text x="368" y="232" fill="#8a93a8" font-size="11" text-anchor="end">TURNED_ON</text>

  <!-- Row 2: BRIGHTNESS_CHANGED -->
  <rect x="16" y="256" width="368" height="40" rx="10" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="282" fill="#ffd99c" font-size="14">✦</text>
  <text x="64" y="280" fill="#5a6478" font-size="11">14:22:47</text>
  <text x="124" y="280" fill="#f5f6fa" font-size="13">Ceiling Light</text>
  <text x="368" y="280" fill="#8a93a8" font-size="11" text-anchor="end">BRIGHTNESS_CHANGED</text>

  <!-- Row 3: TEMP_CHANGED -->
  <rect x="16" y="304" width="368" height="40" rx="10" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="330" fill="#ffd99c" font-size="14">🌡</text>
  <text x="64" y="328" fill="#5a6478" font-size="11">14:22:47</text>
  <text x="124" y="328" fill="#f5f6fa" font-size="13">Kitchen Thermostat</text>
  <text x="368" y="328" fill="#8a93a8" font-size="11" text-anchor="end">TEMP_CHANGED</text>

  <!-- Row 4: LOCKED -->
  <rect x="16" y="352" width="368" height="40" rx="10" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="378" fill="#3ec3b5" font-size="14">▣</text>
  <text x="64" y="376" fill="#5a6478" font-size="11">14:21:08</text>
  <text x="124" y="376" fill="#f5f6fa" font-size="13">Smart Lock</text>
  <text x="368" y="376" fill="#8a93a8" font-size="11" text-anchor="end">LOCKED</text>

  <!-- Row 5: TURNED_OFF -->
  <rect x="16" y="400" width="368" height="40" rx="10" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="426" fill="#8a93a8" font-size="14">○</text>
  <text x="64" y="424" fill="#5a6478" font-size="11">14:20:45</text>
  <text x="124" y="424" fill="#f5f6fa" font-size="13">Lamp</text>
  <text x="368" y="424" fill="#8a93a8" font-size="11" text-anchor="end">TURNED_OFF</text>

  <!-- Row 6: TURNED_ON -->
  <rect x="16" y="448" width="368" height="40" rx="10" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="474" fill="#ffb547" font-size="14">●</text>
  <text x="64" y="472" fill="#5a6478" font-size="11">14:18:11</text>
  <text x="124" y="472" fill="#f5f6fa" font-size="13">Lamp</text>
  <text x="368" y="472" fill="#8a93a8" font-size="11" text-anchor="end">TURNED_ON</text>

  <!-- Row 7: LOCKED -->
  <rect x="16" y="496" width="368" height="40" rx="10" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="522" fill="#3ec3b5" font-size="14">▣</text>
  <text x="64" y="520" fill="#5a6478" font-size="11">14:17:32</text>
  <text x="124" y="520" fill="#f5f6fa" font-size="13">Front Door</text>
  <text x="368" y="520" fill="#8a93a8" font-size="11" text-anchor="end">LOCKED</text>

  <!-- (Faded indicator that more rows continue) -->
  <text x="200" y="580" fill="#5a6478" font-size="11" text-anchor="middle" font-style="italic">… continues with older events …</text>

  <!-- Bottom nav (History highlighted) -->
  <rect x="0" y="736" width="400" height="64" fill="#161f33"/>
  <line x1="0" y1="736" x2="400" y2="736" stroke="#1f2940"/>
  <text x="66" y="763" fill="#8a93a8" font-size="18" text-anchor="middle">🏠</text>
  <text x="66" y="784" fill="#8a93a8" font-size="11" text-anchor="middle">Home</text>
  <text x="200" y="763" fill="#ffb547" font-size="18" text-anchor="middle">📋</text>
  <text x="200" y="784" fill="#ffb547" font-size="11" font-weight="bold" text-anchor="middle">History</text>
  <text x="334" y="763" fill="#8a93a8" font-size="18" text-anchor="middle">🎁</text>
  <text x="334" y="784" fill="#8a93a8" font-size="11" text-anchor="middle">Demo</text>
</svg>
