<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" font-family="'Roboto', 'Segoe UI', sans-serif">
  <rect width="400" height="800" fill="#141218"/>

  <!-- Top bar -->
  <text x="20" y="34" fill="#FFB870" font-size="18">◐</text>
  <text x="40" y="32" fill="#CAC4D0" font-size="9" letter-spacing="1.5">WELCOME HOME</text>
  <text x="40" y="50" fill="#E6E0E9" font-size="20" font-weight="bold">Smart Home</text>
  <rect x="290" y="22" width="92" height="34" rx="17" fill="#00504A"/>
  <text x="336" y="44" fill="#9CF1E3" font-size="13" font-weight="bold" text-anchor="middle">↶ Undo</text>

  <!-- Mode picker (single outlined segmented) -->
  <text x="16" y="86" fill="#CAC4D0" font-size="11" letter-spacing="1.5" font-weight="bold">AUTOMATION MODE</text>
  <rect x="16" y="100" width="368" height="44" rx="22" fill="none" stroke="#938F99"/>
  <line x1="138" y1="100" x2="138" y2="144" stroke="#938F99"/>
  <line x1="261" y1="100" x2="261" y2="144" stroke="#938F99"/>
  <text x="77" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">ECO</text>
  <text x="200" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">SLEEP</text>
  <text x="322" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">AWAY</text>

  <!-- Section -->
  <text x="22" y="194" fill="#E6E0E9" font-size="22" font-weight="bold">Activity</text>
  <text x="22" y="220" fill="#CAC4D0" font-size="12">Device events from this session and earlier — persisted</text>
  <text x="22" y="236" fill="#CAC4D0" font-size="12">via the DAO pattern.</text>

  <!-- Row template: rounded card, leading icon avatar, two-line text, trailing time -->
  <!-- Row 1: hih · Temperature changed -->
  <rect x="16" y="262" width="368" height="60" rx="16" fill="#211F26"/>
  <circle cx="48" cy="292" r="16" fill="#9D3F1A"/>
  <text x="48" y="298" fill="#FFFFFF" font-size="14" text-anchor="middle">🌡</text>
  <text x="78" y="288" fill="#E6E0E9" font-size="13" font-weight="bold">hih</text>
  <text x="78" y="306" fill="#CAC4D0" font-size="11">Temperature changed</text>
  <text x="368" y="296" fill="#79747E" font-size="11" text-anchor="end">22:21:23</text>

  <!-- Row 2 -->
  <rect x="16" y="334" width="368" height="60" rx="16" fill="#211F26"/>
  <circle cx="48" cy="364" r="16" fill="#9D3F1A"/>
  <text x="48" y="370" fill="#FFFFFF" font-size="14" text-anchor="middle">🌡</text>
  <text x="78" y="360" fill="#E6E0E9" font-size="13" font-weight="bold">hih</text>
  <text x="78" y="378" fill="#CAC4D0" font-size="11">Temperature changed</text>
  <text x="368" y="368" fill="#79747E" font-size="11" text-anchor="end">22:21:21</text>

  <!-- Row 3 -->
  <rect x="16" y="406" width="368" height="60" rx="16" fill="#211F26"/>
  <circle cx="48" cy="436" r="16" fill="#9D3F1A"/>
  <text x="48" y="442" fill="#FFFFFF" font-size="14" text-anchor="middle">🌡</text>
  <text x="78" y="432" fill="#E6E0E9" font-size="13" font-weight="bold">hih</text>
  <text x="78" y="450" fill="#CAC4D0" font-size="11">Temperature changed</text>
  <text x="368" y="440" fill="#79747E" font-size="11" text-anchor="end">22:21:16</text>

  <!-- Row 4: light1 turned off -->
  <rect x="16" y="478" width="368" height="60" rx="16" fill="#211F26"/>
  <circle cx="48" cy="508" r="16" fill="#2B2930" stroke="#49454F"/>
  <circle cx="48" cy="508" r="5" fill="none" stroke="#CAC4D0" stroke-width="1.5"/>
  <text x="78" y="504" fill="#E6E0E9" font-size="13" font-weight="bold">light1</text>
  <text x="78" y="522" fill="#CAC4D0" font-size="11">Turned off</text>
  <text x="368" y="512" fill="#79747E" font-size="11" text-anchor="end">22:20:23</text>

  <!-- Row 5: light1 brightness changed -->
  <rect x="16" y="550" width="368" height="60" rx="16" fill="#211F26"/>
  <circle cx="48" cy="580" r="16" fill="#9D3F1A"/>
  <text x="48" y="586" fill="#FFFFFF" font-size="14" text-anchor="middle">✦</text>
  <text x="78" y="576" fill="#E6E0E9" font-size="13" font-weight="bold">light1</text>
  <text x="78" y="594" fill="#CAC4D0" font-size="11">Brightness changed</text>
  <text x="368" y="584" fill="#79747E" font-size="11" text-anchor="end">22:20:20</text>

  <text x="200" y="660" fill="#79747E" font-size="11" text-anchor="middle" font-style="italic">… continues with older events …</text>

  <!-- Bottom nav (Home + History; History active) -->
  <rect x="0" y="720" width="400" height="80" fill="#141218"/>
  <line x1="0" y1="720" x2="400" y2="720" stroke="#49454F"/>
  <text x="100" y="746" fill="#CAC4D0" font-size="14" text-anchor="middle">🏠</text>
  <text x="100" y="772" fill="#CAC4D0" font-size="11" text-anchor="middle">Home</text>
  <rect x="276" y="730" width="48" height="22" rx="11" fill="#00504A"/>
  <text x="300" y="746" fill="#9CF1E3" font-size="14" text-anchor="middle">📋</text>
  <text x="300" y="772" fill="#FFB870" font-size="11" font-weight="bold" text-anchor="middle">History</text>
</svg>
