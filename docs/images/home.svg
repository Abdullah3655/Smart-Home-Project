<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" font-family="'Roboto', 'Segoe UI', sans-serif">
  <!-- M3 Dark surface -->
  <rect width="400" height="800" fill="#141218"/>

  <!-- Top bar: overline + title + filled-tonal Undo pill -->
  <text x="20" y="34" fill="#FFB870" font-size="18">◐</text>
  <text x="40" y="32" fill="#CAC4D0" font-size="9" letter-spacing="1.5">WELCOME HOME</text>
  <text x="40" y="50" fill="#E6E0E9" font-size="20" font-weight="bold">Smart Home</text>
  <rect x="290" y="22" width="92" height="34" rx="17" fill="#00504A"/>
  <text x="336" y="44" fill="#9CF1E3" font-size="13" font-weight="bold" text-anchor="middle">↶ Undo</text>

  <!-- Mode picker overline -->
  <text x="16" y="86" fill="#CAC4D0" font-size="11" letter-spacing="1.5" font-weight="bold">AUTOMATION MODE</text>

  <!-- Single outlined segmented button (3 cells, shared border) -->
  <rect x="16" y="100" width="368" height="44" rx="22" fill="none" stroke="#938F99"/>
  <line x1="138" y1="100" x2="138" y2="144" stroke="#938F99"/>
  <line x1="261" y1="100" x2="261" y2="144" stroke="#938F99"/>
  <text x="77" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">ECO</text>
  <text x="200" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">SLEEP</text>
  <text x="322" y="127" fill="#E6E0E9" font-size="13" font-weight="bold" text-anchor="middle">AWAY</text>

  <!-- Front Door header + device count chip -->
  <text x="22" y="194" fill="#E6E0E9" font-size="20" font-weight="bold">Front Door</text>
  <rect x="318" y="178" width="62" height="22" rx="11" fill="#211F26"/>
  <text x="349" y="194" fill="#CAC4D0" font-size="11" text-anchor="middle">3 devices</text>

  <!-- ============= Device card 1: light1 (OFF) ============= -->
  <rect x="16" y="212" width="368" height="116" rx="16" fill="#211F26"/>
  <!-- Avatar: neutral container, dim icon (light off) -->
  <circle cx="48" cy="244" r="18" fill="#E6E0E9"/>
  <text x="48" y="251" fill="#322F35" font-size="18" text-anchor="middle">💡</text>
  <text x="78" y="240" fill="#E6E0E9" font-size="16" font-weight="bold">light1</text>
  <text x="78" y="258" fill="#79747E" font-size="11">Lighting · Version2</text>
  <!-- State chip: OFF (neutral) -->
  <rect x="316" y="226" width="60" height="22" rx="11" fill="#322F35"/>
  <text x="346" y="241" fill="#CAC4D0" font-size="11" font-weight="bold" text-anchor="middle">OFF</text>
  <!-- Filled "Turn On" -->
  <rect x="32" y="280" width="100" height="34" rx="17" fill="#FFB870"/>
  <text x="82" y="301" fill="#48290B" font-size="13" font-weight="bold" text-anchor="middle">Turn On</text>

  <!-- ============= Device card 2: lock (LOCKED) ============= -->
  <rect x="16" y="340" width="368" height="116" rx="16" fill="#211F26"/>
  <!-- Avatar: teal -->
  <circle cx="48" cy="372" r="18" fill="#00504A"/>
  <text x="48" y="378" fill="#FFFFFF" font-size="16" text-anchor="middle">🔒</text>
  <text x="78" y="368" fill="#E6E0E9" font-size="16" font-weight="bold">lock</text>
  <text x="78" y="386" fill="#79747E" font-size="11">Security · Version2</text>
  <!-- State chip: LOCKED (teal) -->
  <rect x="296" y="354" width="80" height="22" rx="11" fill="#00504A"/>
  <text x="336" y="369" fill="#9CF1E3" font-size="11" font-weight="bold" text-anchor="middle">LOCKED</text>
  <!-- Outlined "Unlock" -->
  <rect x="32" y="408" width="100" height="34" rx="17" fill="none" stroke="#938F99"/>
  <text x="82" y="429" fill="#E6E0E9" font-size="13" text-anchor="middle">Unlock</text>

  <!-- ============= Device card 3: hih (Climate) ============= -->
  <rect x="16" y="468" width="368" height="116" rx="16" fill="#211F26"/>
  <!-- Avatar: orange/red -->
  <circle cx="48" cy="500" r="18" fill="#9D3F1A"/>
  <text x="48" y="506" fill="#FFFFFF" font-size="16" text-anchor="middle">🌡</text>
  <text x="78" y="496" fill="#E6E0E9" font-size="16" font-weight="bold">hih</text>
  <text x="78" y="514" fill="#79747E" font-size="11">Climate · Version2</text>
  <!-- Temp chip -->
  <rect x="316" y="482" width="60" height="22" rx="11" fill="#684626"/>
  <text x="346" y="497" fill="#FFDDB7" font-size="12" font-weight="bold" text-anchor="middle">15°C</text>
  <!-- Spinner -->
  <circle cx="60" cy="546" r="14" fill="#2B2930"/>
  <text x="60" y="551" fill="#E6E0E9" font-size="14" font-weight="bold" text-anchor="middle">−</text>
  <text x="120" y="552" fill="#FFB870" font-size="18" font-weight="bold">15°C</text>
  <circle cx="194" cy="546" r="14" fill="#2B2930"/>
  <text x="194" y="551" fill="#E6E0E9" font-size="14" font-weight="bold" text-anchor="middle">+</text>

  <!-- + Add device pill -->
  <rect x="16" y="600" width="368" height="40" rx="20" fill="none" stroke="#49454F" stroke-dasharray="4 3"/>
  <text x="200" y="624" fill="#FFB870" font-size="13" font-weight="bold" text-anchor="middle">+ Add device to Front Door</text>

  <!-- Bottom nav (M3, two destinations) -->
  <rect x="0" y="720" width="400" height="80" fill="#141218"/>
  <line x1="0" y1="720" x2="400" y2="720" stroke="#49454F"/>
  <!-- Home (active) -->
  <rect x="76" y="730" width="48" height="22" rx="11" fill="#00504A"/>
  <text x="100" y="746" fill="#9CF1E3" font-size="14" text-anchor="middle">🏠</text>
  <text x="100" y="772" fill="#FFB870" font-size="11" font-weight="bold" text-anchor="middle">Home</text>
  <!-- History (inactive) -->
  <text x="300" y="746" fill="#CAC4D0" font-size="14" text-anchor="middle">📋</text>
  <text x="300" y="772" fill="#CAC4D0" font-size="11" text-anchor="middle">History</text>
</svg>
