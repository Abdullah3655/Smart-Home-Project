<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" font-family="'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="400" height="800" fill="#0e1626"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="400" height="60" fill="#0e1626"/>
  <line x1="0" y1="60" x2="400" y2="60" stroke="#1f2940"/>
  <text x="16" y="38" fill="#ffb547" font-size="20" font-weight="bold">●</text>
  <text x="36" y="38" fill="#f5f6fa" font-size="20" font-weight="bold">Smart Home</text>
  <rect x="290" y="14" width="94" height="32" rx="8" fill="#161f33" stroke="#1f2940"/>
  <text x="337" y="34" fill="#f5f6fa" font-size="13" text-anchor="middle">↶  Undo</text>

  <!-- Mode picker -->
  <text x="16" y="80" fill="#8a93a8" font-size="12">AUTOMATION</text>
  <rect x="16" y="88" width="120" height="44" rx="8" fill="#ffb547"/>
  <text x="76" y="115" fill="#0e1626" font-size="13" font-weight="bold" text-anchor="middle">ECO</text>
  <rect x="136" y="88" width="120" height="44" fill="#161f33" stroke="#1f2940"/>
  <text x="196" y="115" fill="#8a93a8" font-size="13" font-weight="bold" text-anchor="middle">SLEEP</text>
  <rect x="256" y="88" width="120" height="44" rx="8" fill="#161f33" stroke="#1f2940"/>
  <text x="316" y="115" fill="#8a93a8" font-size="13" font-weight="bold" text-anchor="middle">AWAY</text>

  <!-- Status banner -->
  <rect x="0" y="148" width="400" height="36" fill="#1a3d3a"/>
  <text x="16" y="170" fill="#f5f6fa" font-size="12">✓ Eco mode applied to the whole home.</text>

  <!-- Content scroll area starts at y=200 -->

  <!-- Kitchen header -->
  <text x="16" y="218" fill="#f5f6fa" font-size="16" font-weight="bold">Kitchen</text>
  <text x="384" y="218" fill="#8a93a8" font-size="12" text-anchor="end">2 devices</text>

  <!-- Ceiling Light card -->
  <rect x="16" y="232" width="368" height="92" rx="12" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="262" fill="#f5f6fa" font-size="22">💡</text>
  <text x="64" y="258" fill="#f5f6fa" font-size="14" font-weight="bold">Ceiling Light</text>
  <text x="64" y="276" fill="#5a6478" font-size="11">Lighting · Version2</text>
  <text x="368" y="258" fill="#ffb547" font-size="12" font-weight="bold" text-anchor="end">● ON</text>
  <rect x="32" y="290" width="100" height="26" rx="8" fill="#1f2940" stroke="#2a3550"/>
  <text x="82" y="307" fill="#f5f6fa" font-size="12" text-anchor="middle">Turn Off</text>

  <!-- Kitchen Thermostat card -->
  <rect x="16" y="336" width="368" height="92" rx="12" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="366" fill="#f5f6fa" font-size="22">🌡</text>
  <text x="64" y="362" fill="#f5f6fa" font-size="14" font-weight="bold">Kitchen Thermostat</text>
  <text x="64" y="380" fill="#5a6478" font-size="11">Climate · Version2</text>
  <text x="368" y="362" fill="#ffb547" font-size="12" font-weight="bold" text-anchor="end">24°C</text>
  <rect x="32" y="394" width="36" height="26" rx="8" fill="#1f2940" stroke="#2a3550"/>
  <text x="50" y="411" fill="#f5f6fa" font-size="14" font-weight="bold" text-anchor="middle">−</text>
  <text x="100" y="412" fill="#ffb547" font-size="16" font-weight="bold" text-anchor="middle">24°C</text>
  <rect x="132" y="394" width="36" height="26" rx="8" fill="#1f2940" stroke="#2a3550"/>
  <text x="150" y="411" fill="#f5f6fa" font-size="14" font-weight="bold" text-anchor="middle">+</text>

  <!-- + Add device -->
  <rect x="16" y="438" width="368" height="32" rx="8" fill="#161f33" stroke="#1f2940"/>
  <text x="200" y="458" fill="#8a93a8" font-size="12" text-anchor="middle">+ Add device to Kitchen</text>

  <!-- Living Room header -->
  <text x="16" y="496" fill="#f5f6fa" font-size="16" font-weight="bold">Living Room</text>
  <text x="384" y="496" fill="#8a93a8" font-size="12" text-anchor="end">2 devices</text>

  <!-- Lamp card -->
  <rect x="16" y="510" width="368" height="92" rx="12" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="540" fill="#f5f6fa" font-size="22">💡</text>
  <text x="64" y="536" fill="#f5f6fa" font-size="14" font-weight="bold">Lamp</text>
  <text x="64" y="554" fill="#5a6478" font-size="11">Lighting · Version2</text>
  <text x="368" y="536" fill="#8a93a8" font-size="12" font-weight="bold" text-anchor="end">○ OFF</text>
  <rect x="32" y="568" width="100" height="26" rx="8" fill="#ffb547"/>
  <text x="82" y="585" fill="#0e1626" font-size="12" font-weight="bold" text-anchor="middle">Turn On</text>

  <!-- Living Room Camera card -->
  <rect x="16" y="614" width="368" height="92" rx="12" fill="#161f33" stroke="#1f2940"/>
  <text x="32" y="644" fill="#f5f6fa" font-size="22">📷</text>
  <text x="64" y="640" fill="#f5f6fa" font-size="14" font-weight="bold">Living Room Camera</text>
  <text x="64" y="658" fill="#5a6478" font-size="11">Security · Version2</text>
  <text x="368" y="640" fill="#8a93a8" font-size="12" font-weight="bold" text-anchor="end">○ OFF</text>
  <rect x="32" y="672" width="100" height="26" rx="8" fill="#ffb547"/>
  <text x="82" y="689" fill="#0e1626" font-size="12" font-weight="bold" text-anchor="middle">Turn On</text>

  <!-- Bottom nav -->
  <rect x="0" y="736" width="400" height="64" fill="#161f33"/>
  <line x1="0" y1="736" x2="400" y2="736" stroke="#1f2940"/>
  <text x="66" y="763" fill="#ffb547" font-size="18" text-anchor="middle">🏠</text>
  <text x="66" y="784" fill="#ffb547" font-size="11" font-weight="bold" text-anchor="middle">Home</text>
  <text x="200" y="763" fill="#8a93a8" font-size="18" text-anchor="middle">📋</text>
  <text x="200" y="784" fill="#8a93a8" font-size="11" text-anchor="middle">History</text>
  <text x="334" y="763" fill="#8a93a8" font-size="18" text-anchor="middle">🎁</text>
  <text x="334" y="784" fill="#8a93a8" font-size="11" text-anchor="middle">Demo</text>
</svg>
