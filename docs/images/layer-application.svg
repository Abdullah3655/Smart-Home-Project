<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" font-family="'Segoe UI', sans-serif">
  <rect width="320" height="240" fill="#ffffff" stroke="#1f2940" stroke-width="1"/>
  <text x="160" y="20" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">Application layer (Facade + Command)</text>

  <!-- HomeController (Facade) -->
  <rect x="80" y="36" width="160" height="48" rx="4" fill="#fff7e6" stroke="#e0a020" stroke-width="1.5"/>
  <text x="160" y="52" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">HomeController</text>
  <text x="160" y="64" font-size="9" text-anchor="middle" fill="#5a6478">«Facade»</text>
  <text x="160" y="78" font-size="8" text-anchor="middle" fill="#5a6478">turnOnDevice / undoLastAction / …</text>

  <!-- CommandInvoker -->
  <rect x="100" y="100" width="120" height="44" rx="4" fill="#fff7e6" stroke="#e0a020"/>
  <text x="160" y="116" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">CommandInvoker</text>
  <text x="160" y="128" font-size="9" text-anchor="middle" fill="#5a6478">«Invoker»</text>
  <text x="160" y="139" font-size="8" text-anchor="middle" fill="#5a6478">execute / undo / canUndo</text>

  <!-- DeviceCommand interface -->
  <rect x="100" y="160" width="120" height="36" rx="4" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="160" y="176" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">DeviceCommand</text>
  <text x="160" y="188" font-size="9" text-anchor="middle" fill="#5a6478">«interface, Command»</text>

  <!-- Concrete commands -->
  <rect x="20" y="208" width="280" height="22" rx="3" fill="#f4f6f9" stroke="#8a93a8"/>
  <text x="160" y="223" font-size="9" text-anchor="middle" fill="#1f2940">TurnOn / TurnOff / SetTemp / Lock / Unlock / SetMode (6 concrete commands)</text>

  <!-- Arrows -->
  <line x1="160" y1="84" x2="160" y2="100" stroke="#1f2940" stroke-width="1" marker-end="url(#arr2)"/>
  <line x1="160" y1="144" x2="160" y2="160" stroke="#1f2940" stroke-width="0.6" stroke-dasharray="2,2"/>
  <line x1="160" y1="196" x2="160" y2="208" stroke="#1f2940" stroke-width="1" marker-end="url(#arr2)" stroke-dasharray="2,2"/>

  <defs>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1f2940"/>
    </marker>
  </defs>
</svg>
