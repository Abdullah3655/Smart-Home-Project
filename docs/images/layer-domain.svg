<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" font-family="'Segoe UI', sans-serif">
  <rect width="320" height="280" fill="#ffffff" stroke="#1f2940" stroke-width="1"/>
  <text x="160" y="20" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">Domain layer (6 of 9 patterns)</text>

  <!-- SmartHomeHub -->
  <rect x="20" y="36" width="140" height="40" rx="4" fill="#fff7e6" stroke="#e0a020"/>
  <text x="90" y="52" font-size="10" font-weight="bold" text-anchor="middle" fill="#1f2940">SmartHomeHub</text>
  <text x="90" y="64" font-size="8" text-anchor="middle" fill="#5a6478">«Singleton + Strategy Context»</text>
  <text x="90" y="74" font-size="7" text-anchor="middle" fill="#5a6478">getInstance / addRoom / applyMode</text>

  <!-- Room -->
  <rect x="180" y="36" width="120" height="40" rx="4" fill="#fff7e6" stroke="#e0a020"/>
  <text x="240" y="52" font-size="10" font-weight="bold" text-anchor="middle" fill="#1f2940">Room</text>
  <text x="240" y="64" font-size="8" text-anchor="middle" fill="#5a6478">«Iterator host»</text>
  <text x="240" y="74" font-size="7" text-anchor="middle" fill="#5a6478">enumerateDevices()</text>

  <!-- Device abstract -->
  <rect x="100" y="92" width="120" height="40" rx="4" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="160" y="108" font-size="10" font-weight="bold" text-anchor="middle" fill="#1f2940" font-style="italic">Device</text>
  <text x="160" y="120" font-size="8" text-anchor="middle" fill="#5a6478">«abstract, Subject»</text>
  <text x="160" y="130" font-size="7" text-anchor="middle" fill="#5a6478">turnOn / notifyObservers</text>

  <!-- Concrete devices -->
  <rect x="20" y="148" width="280" height="20" rx="3" fill="#f4f6f9" stroke="#8a93a8"/>
  <text x="160" y="161" font-size="8" text-anchor="middle" fill="#1f2940">Light · Thermostat · Lock · Camera (each: Version1 + Version2 variants)</text>

  <!-- DeviceFactory -->
  <rect x="20" y="180" width="140" height="36" rx="4" fill="#fff7e6" stroke="#e0a020"/>
  <text x="90" y="195" font-size="10" font-weight="bold" text-anchor="middle" fill="#1f2940" font-style="italic">DeviceFactory</text>
  <text x="90" y="205" font-size="8" text-anchor="middle" fill="#5a6478">«Abstract Factory»</text>
  <text x="90" y="213" font-size="7" text-anchor="middle" fill="#5a6478">createLight / createThermostat / …</text>

  <!-- AutomationMode -->
  <rect x="180" y="180" width="120" height="36" rx="4" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="240" y="195" font-size="10" font-weight="bold" text-anchor="middle" fill="#1f2940">AutomationMode</text>
  <text x="240" y="205" font-size="8" text-anchor="middle" fill="#5a6478">«interface, Strategy»</text>
  <text x="240" y="213" font-size="7" text-anchor="middle" fill="#5a6478">apply(SmartHomeHub)</text>

  <!-- DeviceDecorator -->
  <rect x="60" y="232" width="200" height="32" rx="4" fill="#e3f5f0" stroke="#3ec3b5"/>
  <text x="160" y="247" font-size="10" font-weight="bold" text-anchor="middle" fill="#1f2940" font-style="italic">DeviceDecorator</text>
  <text x="160" y="259" font-size="8" text-anchor="middle" fill="#5a6478">«Decorator» (wraps Device)</text>

  <!-- Arrows -->
  <line x1="90" y1="76" x2="120" y2="92" stroke="#5a6478" stroke-width="0.6"/>
  <line x1="240" y1="76" x2="200" y2="92" stroke="#5a6478" stroke-width="0.6"/>
  <line x1="160" y1="132" x2="160" y2="148" stroke="#5a6478" stroke-width="0.6"/>
  <line x1="160" y1="232" x2="160" y2="148" stroke="#3ec3b5" stroke-width="0.6" stroke-dasharray="2,2"/>
</svg>
