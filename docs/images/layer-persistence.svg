<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" font-family="'Segoe UI', sans-serif">
  <rect width="320" height="240" fill="#ffffff" stroke="#1f2940" stroke-width="1"/>
  <text x="160" y="20" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">Persistence layer (Database + DAOs)</text>

  <!-- Database -->
  <rect x="100" y="36" width="120" height="44" rx="4" fill="#fff7e6" stroke="#e0a020" stroke-width="1.5"/>
  <text x="160" y="52" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">Database</text>
  <text x="160" y="64" font-size="9" text-anchor="middle" fill="#5a6478">«Singleton»</text>
  <text x="160" y="76" font-size="8" text-anchor="middle" fill="#5a6478">getInstance / getConnection</text>

  <!-- 5 DAOs -->
  <rect x="20" y="100" width="60" height="28" rx="3" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="50" y="118" font-size="9" font-weight="bold" text-anchor="middle" fill="#1f2940">UserDAO</text>

  <rect x="86" y="100" width="60" height="28" rx="3" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="116" y="118" font-size="9" font-weight="bold" text-anchor="middle" fill="#1f2940">RoomDAO</text>

  <rect x="152" y="100" width="60" height="28" rx="3" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="182" y="118" font-size="9" font-weight="bold" text-anchor="middle" fill="#1f2940">DeviceDAO</text>

  <rect x="218" y="100" width="80" height="28" rx="3" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="258" y="118" font-size="9" font-weight="bold" text-anchor="middle" fill="#1f2940">DeviceEventDAO</text>

  <rect x="92" y="136" width="120" height="28" rx="3" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="152" y="154" font-size="9" font-weight="bold" text-anchor="middle" fill="#1f2940">CommandsLogDAO</text>

  <text x="160" y="180" font-size="8" text-anchor="middle" fill="#5a6478">All DAOs: insert / findById / findByRoom / findRecent</text>

  <!-- DTOs -->
  <rect x="60" y="196" width="200" height="22" rx="3" fill="#f4f6f9" stroke="#8a93a8"/>
  <text x="160" y="211" font-size="9" text-anchor="middle" fill="#1f2940">User · DeviceEvent · CommandLog (DTO records)</text>

  <!-- Arrows from DAOs to Database -->
  <line x1="50" y1="100" x2="140" y2="80" stroke="#5a6478" stroke-width="0.5"/>
  <line x1="116" y1="100" x2="150" y2="80" stroke="#5a6478" stroke-width="0.5"/>
  <line x1="182" y1="100" x2="170" y2="80" stroke="#5a6478" stroke-width="0.5"/>
  <line x1="258" y1="100" x2="180" y2="80" stroke="#5a6478" stroke-width="0.5"/>
  <line x1="152" y1="136" x2="160" y2="80" stroke="#5a6478" stroke-width="0.5"/>
</svg>
