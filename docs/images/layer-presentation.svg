<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" font-family="'Segoe UI', sans-serif">
  <rect width="320" height="240" fill="#ffffff" stroke="#1f2940" stroke-width="1"/>
  <text x="160" y="20" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">Presentation layer (JavaFX)</text>

  <!-- App -->
  <rect x="20" y="36" width="120" height="38" rx="4" fill="#fff7e6" stroke="#e0a020"/>
  <text x="80" y="52" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">App</text>
  <text x="80" y="66" font-size="9" text-anchor="middle" fill="#5a6478">«JavaFX entry»</text>

  <!-- MainController -->
  <rect x="180" y="36" width="120" height="38" rx="4" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="240" y="52" font-size="11" font-weight="bold" text-anchor="middle" fill="#1f2940">MainController</text>
  <text x="240" y="66" font-size="9" text-anchor="middle" fill="#5a6478">top bar + nav</text>

  <!-- Three screen controllers -->
  <rect x="20" y="92" width="92" height="32" rx="4" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="66" y="112" font-size="10" text-anchor="middle" fill="#1f2940">HomeController</text>
  <rect x="116" y="92" width="92" height="32" rx="4" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="162" y="112" font-size="10" text-anchor="middle" fill="#1f2940">HistoryController</text>
  <rect x="212" y="92" width="92" height="32" rx="4" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="258" y="112" font-size="10" text-anchor="middle" fill="#1f2940">DecoratorController</text>

  <rect x="68" y="138" width="92" height="32" rx="4" fill="#eaf0fb" stroke="#4a73c5"/>
  <text x="114" y="158" font-size="10" text-anchor="middle" fill="#1f2940">AddDeviceController</text>

  <!-- DaoEventBridge -->
  <rect x="170" y="138" width="130" height="32" rx="4" fill="#e3f5f0" stroke="#3ec3b5"/>
  <text x="235" y="155" font-size="10" font-weight="bold" text-anchor="middle" fill="#1f2940">DaoEventBridge</text>
  <text x="235" y="166" font-size="8" text-anchor="middle" fill="#5a6478">«Observer adapter»</text>

  <!-- HomeBus -->
  <rect x="100" y="184" width="120" height="28" rx="4" fill="#f4f6f9" stroke="#8a93a8"/>
  <text x="160" y="202" font-size="10" text-anchor="middle" fill="#1f2940">HomeBus</text>

  <!-- Arrows -->
  <line x1="140" y1="55" x2="180" y2="55" stroke="#1f2940" stroke-width="1" marker-end="url(#arr1)"/>
  <line x1="240" y1="74" x2="66" y2="92" stroke="#5a6478" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="240" y1="74" x2="162" y2="92" stroke="#5a6478" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="240" y1="74" x2="258" y2="92" stroke="#5a6478" stroke-width="0.5" stroke-dasharray="2,2"/>

  <defs>
    <marker id="arr1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1f2940"/>
    </marker>
  </defs>
</svg>
